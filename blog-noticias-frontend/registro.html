<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Blog Noticias Nenuko</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none text-dark h3 fw-bold"><i class="bi bi-newspaper text-warning me-2"></i>Blog Noticias Nenuko</a>
                <p class="text-muted mt-2">Crea tu cuenta de lector</p>
            </div>

            <div class="alert alert-danger d-none" id="alert-error" role="alert"></div>
            <div class="alert alert-success d-none" id="alert-success" role="alert"></div>

            <form id="form-registro">
                <div class="mb-3">
                    <label for="nombre" class="form-label fw-semibold">Nombre Completo</label>
                    <input type="text" class="form-control" id="nombre" required placeholder="Juan Pérez">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">Registrarse</button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 small text-muted">¿Ya tienes cuenta? <a href="login.html" class="text-decoration-none fw-bold">Inicia Sesión</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const alertError = document.getElementById('alert-error');
            const alertSuccess = document.getElementById('alert-success');

            alertError.add ? alertError.classList.add('d-none') : alertError.classList.add('d-none');
            alertSuccess.classList.add('d-none');

            try {
                const respuesta = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password })
                });

                const data = await respuesta.json();

                if (!respuesta.ok) {
                    throw new Error(data.error || 'Error al registrar usuario.');
                }

                alertSuccess.innerText = "¡Registro exitoso! Redirigiendo al login...";
                alertSuccess.classList.remove('d-none');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                alertError.innerText = error.message;
                alertError.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
