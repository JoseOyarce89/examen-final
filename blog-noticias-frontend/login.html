<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Blog Noticias Nenuko</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none text-dark h3 fw-bold"><i class="bi bi-newspaper text-primary me-2"></i>Blog Noticias Nenuko</a>
                <p class="text-muted mt-2">Ingresa a tu cuenta para interactuar</p>
            </div>

            <div class="alert alert-danger d-none" id="alert-error" role="alert"></div>

            <form id="form-login">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Entrar</button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0 small text-muted">¿No tienes cuenta? <a href="registro.html" class="text-decoration-none fw-bold">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página se recargue
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertError = document.getElementById('alert-error');

            alertError.classList.add('d-none'); // Ocultar error previo

            try {
                const respuesta = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await respuesta.json();

                if (!respuesta.ok) {
                    throw new Error(data.error || 'Error al iniciar sesión.');
                }

                // Guardar sesión en el navegador (Requerimiento de persistencia básico)
                localStorage.setItem('token', data.token);
                localStorage.setItem('usuario', JSON.stringify(data.usuario));

                // Redireccionar al inicio
                window.location.href = 'index.html';

            } catch (error) {
                alertError.innerText = error.message;
                alertError.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
